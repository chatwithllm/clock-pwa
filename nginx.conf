server {
  listen       80;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/css application/javascript application/manifest+json image/svg+xml application/json;

  # Service worker must always revalidate so app-shell updates ship.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  # Ensure the manifest is served with the correct MIME type.
  location = /manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
