server {
  listen       80;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/css application/javascript application/manifest+json image/svg+xml application/json;

  # Service worker must always revalidate so app-shell updates ship.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  # Admin page — basic-auth (see /etc/nginx/admin_auth.conf, written at startup).
  location = /admin.html {
    include /etc/nginx/admin_auth.conf;
    add_header Cache-Control "no-cache";
  }
  # JS/CSS have no content hash (no build step) — revalidate each load so code
  # updates ship. The service worker still caches them for offline use.
  location ~* \.(?:js|css)$ {
    add_header Cache-Control "no-cache";
  }
  # Ensure the manifest is served with the correct MIME type.
  location = /manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
  }
  # Server-provided location config — admin can edit live, so never cache it.
  location = /config.json {
    default_type application/json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  # Server-pushed weather (written by the fetcher) — always fresh, may 404 until
  # the first successful fetch (client falls back to direct / cache).
  location = /weather.json {
    default_type application/json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  # Server-pushed announcements — served from the writable /data dir and accepted
  # via WebDAV PUT from the admin page. Polled by every device, must be fresh.
  location = /announce.json {
    root /data;
    default_type application/json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
    dav_methods PUT;
    create_full_put_path off;
    client_body_temp_path /data/tmp;
    client_max_body_size 64k;
    # GET (device polling) stays open; writing (PUT) requires admin auth.
    limit_except GET { include /etc/nginx/admin_auth.conf; }
  }
  # Admin-managed custom room profiles — served from the writable /data dir,
  # written via WebDAV PUT from the admin page. Polled by every device.
  location = /profiles.json {
    root /data;
    default_type application/json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
    dav_methods PUT;
    create_full_put_path off;
    client_body_temp_path /data/tmp;
    client_max_body_size 64k;
    # GET (device polling) stays open; writing (PUT) requires admin auth.
    limit_except GET { include /etc/nginx/admin_auth.conf; }
  }
  # Uploaded announcement media (images / GIFs). Open GET for devices; PUT and
  # DELETE require admin basic-auth. Files live in the writable /data/uploads dir.
  location /uploads/ {
    root /data;
    default_type application/octet-stream;
    add_header Cache-Control "public, max-age=31536000, immutable";
    dav_methods PUT DELETE;
    create_full_put_path on;
    client_body_temp_path /data/tmp;
    client_max_body_size 8m;
    limit_except GET { include /etc/nginx/admin_auth.conf; }
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
