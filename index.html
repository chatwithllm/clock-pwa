<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Clock &amp; Weather</title>

  <!-- PWA / iOS meta -->
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clock">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-180.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Weather FX backdrop (dynamic display mode). Behind everything, never blocks input. -->
  <canvas class="fx" id="fx" aria-hidden="true"></canvas>

  <!-- Always-present dim layer (pointer-events:none) -->
  <div class="dim" id="dim" aria-hidden="true"></div>

  <main class="app" id="app">
    <!-- WEATHER region -->
    <section class="weather" id="weather" aria-label="Local weather">
      <div class="wx-empty" id="wxEmpty">Loading weather…</div>
      <div class="wx-card" id="wxCard" hidden>
        <div class="wx-top">
          <span class="wx-icon" id="wxIcon" aria-hidden="true">·</span>
          <span class="wx-temp" id="wxTemp">--°</span>
        </div>
        <div class="wx-cond" id="wxCond">—</div>
        <div class="wx-meta">
          <span id="wxFeels">Feels --°</span>
          <span id="wxHiLo">H --° L --°</span>
          <span id="wxSunrise" class="wx-sunrise" hidden></span>
        </div>
        <div class="wx-sun" id="wxSun" aria-label="Sun position" hidden></div>
        <div class="wx-place" id="wxPlace"></div>
        <div class="wx-stale" id="wxStale" hidden></div>
      </div>
    </section>

    <!-- STAGE region (clock fills its CELL) -->
    <section class="stage" id="stage" aria-label="Clock"></section>

    <!-- CHROME region (controls band, always reserved, fades) -->
    <nav class="chrome" id="chrome" aria-label="Controls">
      <span class="wl-status" id="wlStatus" role="status" aria-live="polite" hidden>
        <span class="wl-dot" id="wlDot" aria-hidden="true"></span><span class="wl-text" id="wlText"></span>
      </span>
      <button class="ctrl" id="btnMode" type="button" data-nav>Analog</button>
      <button class="ctrl" id="btnDim" type="button" data-nav>Dim</button>
      <button class="ctrl" id="btnGear" type="button" data-nav aria-haspopup="dialog">Settings</button>
    </nav>

    <!-- Secondary clock (small, subtle; optional) -->
    <div class="second-clock" id="secondClock" hidden aria-label="Secondary clock">
      <span class="sc-time" id="secondTime"></span>
      <span class="sc-meta">
        <span class="sc-label" id="secondLabel"></span>
        <span class="sc-day" id="secondDay"></span>
      </span>
      <span class="sc-temp" id="secondTemp" hidden></span>
    </div>

    <!-- Critical-alert overlay (red, blocks the screen). Hidden unless a critical is active. -->
    <div class="alert-overlay" id="alertOverlay" hidden role="alertdialog" aria-label="Critical alert">
      <div class="alert-card">
        <div class="alert-title" id="alertTitle"></div>
        <div class="alert-message" id="alertMessage"></div>
        <div class="alert-time" id="alertTime"></div>
        <div class="alert-more" id="alertMore"></div>
      </div>
    </div>
    <!-- Warning banner (amber strip, non-blocking). -->
    <div class="alert-banner" id="alertBanner" hidden role="status"></div>
  </main>

  <!-- OVERLAYS: settings panel (display:none when closed → zero layout space) -->
  <div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="Settings" aria-hidden="true">
    <div class="panel-box">
      <h2 class="panel-title">Settings</h2>

      <div class="row">
        <span class="row-label">Clock</span>
        <button class="ctrl" id="setMode" type="button" data-nav>Digital</button>
      </div>
      <div class="row">
        <span class="row-label">Style</span>
        <button class="ctrl" id="setStyle" type="button" data-nav>Classic</button>
      </div>
      <div class="row">
        <span class="row-label">Orientation</span>
        <button class="ctrl" id="setOrient" type="button" data-nav>Auto</button>
      </div>
      <div class="row">
        <span class="row-label">Display</span>
        <button class="ctrl" id="setDisplay" type="button" data-nav>Plain</button>
      </div>
      <div class="row">
        <span class="row-label">Sun arc</span>
        <button class="ctrl" id="setSun" type="button" data-nav>On</button>
      </div>
      <div class="row">
        <span class="row-label">Hour format</span>
        <button class="ctrl" id="setHour" type="button" data-nav>12h</button>
      </div>
      <div class="row">
        <span class="row-label">Seconds</span>
        <button class="ctrl" id="setSeconds" type="button" data-nav>On</button>
      </div>
      <div class="row">
        <span class="row-label">Date</span>
        <button class="ctrl" id="setDate" type="button" data-nav>On</button>
      </div>
      <div class="row">
        <span class="row-label">Second clock</span>
        <button class="ctrl" id="setSecond" type="button" data-nav>Off</button>
      </div>
      <div class="row">
        <span class="row-label">Night dim</span>
        <button class="ctrl" id="setNight" type="button" data-nav>Off</button>
      </div>
      <div class="row">
        <span class="row-label">Sound</span>
        <button class="ctrl" id="setSound" type="button" data-nav>Off</button>
      </div>

      <div class="row">
        <span class="row-label">Profile</span>
        <button class="ctrl" id="setProfile" type="button" data-nav>None</button>
      </div>
      <div class="row">
        <span class="row-label">Source</span>
        <button class="ctrl" id="setSource" type="button" data-nav>Server</button>
      </div>
      <div class="row" id="sourceManagedRow" hidden>
        <span class="row-label"></span>
        <span class="row-note" id="sourceManaged">Managed by server</span>
      </div>
      <div class="row row-col">
        <label class="row-label" for="setCity">Your location (ZIP or city)</label>
        <div class="city-wrap">
          <input class="city-input" id="setCity" type="text" inputmode="search"
                 placeholder="ZIP code or city name" data-nav autocomplete="off">
          <button class="ctrl" id="setCityGo" type="button" data-nav>Find</button>
        </div>
        <div class="city-status" id="cityStatus" aria-live="polite"></div>
      </div>

      <div class="row row-end">
        <button class="ctrl" id="setGeo" type="button" data-nav>Use my location</button>
        <button class="ctrl ctrl-primary" id="setClose" type="button" data-nav>Close</button>
      </div>
    </div>
  </div>

  <!-- Server-pushed announcement overlay -->
  <div class="announce" id="announce" role="alertdialog" aria-modal="true" aria-label="Announcement" hidden>
    <div class="announce-box">
      <span class="announce-icon" id="announceIcon" aria-hidden="true">📢</span>
      <div class="announce-body">
        <div class="announce-text" id="announceText"></div>
        <div class="announce-sub" id="announceSub"></div>
        <img class="announce-img" id="announceImage" alt="" hidden onerror="this.hidden=true">
      </div>
      <button class="ctrl ctrl-primary announce-close" id="announceClose" type="button" data-nav>Dismiss</button>
    </div>
  </div>
  <!-- Stacked announcement toasts (shown when 2+ are live) -->
  <div class="announce-stack" id="announceStack" aria-live="polite" hidden></div>

  <!-- Hidden video fallback for wake-lock (phone only; created/used by wakelock.js) -->
  <video class="wl-video" id="wlVideo" playsinline muted loop disablepictureinpicture
         aria-hidden="true" tabindex="-1"></video>

  <script type="module" src="js/app.js"></script>
</body>
</html>
