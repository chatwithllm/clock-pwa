services:
  clock:
    build: .
    image: clock-pwa
    container_name: clock-pwa
    ports:
      - "8080:80"     # open http://localhost:8080
    environment:
      # Server location for all devices (Settings -> Location -> Server).
      # Written into config.json at container start. Edit + `docker compose up -d`.
      CLOCK_LAT: "39.7684"
      CLOCK_LON: "-86.1581"
      CLOCK_CITY: "Indianapolis"
    volumes:
      # Broadcast announcements by editing this file on the host (or use the helper:
      #   docker exec clock-pwa /usr/local/bin/announce.sh "message" [target] [secs])
      - ./announce.json:/usr/share/nginx/html/announce.json
      # Alternative to the env vars above: mount + live-edit config.json instead
      # (don't use both — a read-only mount can't be overwritten by the env step).
      # - ./config.json:/usr/share/nginx/html/config.json
    restart: unless-stopped
