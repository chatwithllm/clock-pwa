services:
  clock:
    build: .
    image: clock-pwa
    container_name: clock-pwa
    ports:
      - "8080:80"     # open http://localhost:8080
    environment:
      # Server location for all devices (Settings -> Location -> Server).
      # Written into config.json at container start. Edit + `docker compose up -d`.
      CLOCK_LAT: "39.7684"
      CLOCK_LON: "-86.1581"
      CLOCK_CITY: "Indianapolis"
    # Announcements are sent from the admin page (http://<host>:8080/admin.html)
    # or the helper (docker exec clock-pwa /usr/local/bin/announce.sh "msg"); they
    # write the in-container /data/announce.json (no host mount needed).
    # volumes:
    #   # Alternative to the env vars above: mount + live-edit config.json instead.
    #   - ./config.json:/usr/share/nginx/html/config.json
    restart: unless-stopped
