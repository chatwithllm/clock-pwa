<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" href="icons/icon-192.png">
  <title>Clock Displays — Admin</title>
  <style>
    :root{ --bg:#0c0e13; --card:#141821; --bd:#2a2f3a; --fg:#e8e8ea; --dim:#9aa0ab; --accent:#4fa3ff; --ok:#43d17a; --err:#e0625f; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:grid;place-items:start center;padding:24px}
    .wrap{width:min(620px,100%)}
    h1{font-size:22px;margin:8px 0 4px;letter-spacing:.02em}
    .sub{color:var(--dim);font-size:13px;margin-bottom:20px}
    .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px}
    label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:14px 0 6px}
    textarea,input,select{width:100%;font:inherit;font-size:16px;color:var(--fg);background:#0f131a;
      border:1px solid var(--bd);border-radius:9px;padding:11px 13px}
    textarea{min-height:84px;resize:vertical}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .row > div{flex:1;min-width:140px}
    .presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .chip{font:inherit;font-size:13px;color:var(--fg);background:#0f131a;border:1px solid var(--bd);
      border-radius:999px;padding:6px 12px;cursor:pointer}
    .chip:hover{border-color:var(--accent)}
    .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
    button.go{flex:1;min-width:160px;font:inherit;font-size:16px;font-weight:600;color:#06223f;background:var(--accent);
      border:0;border-radius:10px;padding:13px;cursor:pointer}
    button.ghost{font:inherit;font-size:15px;color:var(--fg);background:transparent;border:1px solid var(--bd);
      border-radius:10px;padding:13px 18px;cursor:pointer}
    .status{margin-top:14px;font-size:14px;min-height:1.3em}
    .status.ok{color:var(--ok)} .status.err{color:var(--err)}
    .hint{color:var(--dim);font-size:12px;margin-top:18px;line-height:1.5}
    code{background:#0f131a;border:1px solid var(--bd);border-radius:5px;padding:1px 5px;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📢 Clock Displays — Announce</h1>
    <div class="sub">Push a message to your clock displays on this network.</div>

    <div class="card">
      <label for="msg">Message</label>
      <textarea id="msg" placeholder="e.g. Dinner is ready!" autofocus></textarea>
      <div class="presets" id="presets"></div>

      <div class="row">
        <div>
          <label for="target">Send to</label>
          <select id="target"></select>
        </div>
        <div>
          <label for="dur">Duration (seconds)</label>
          <input id="dur" type="number" min="3" max="600" value="20">
        </div>
        <div>
          <label for="icon">Icon (optional)</label>
          <input id="icon" type="text" value="📢" maxlength="4">
        </div>
      </div>

      <label for="imgFile">Image / GIF (optional)</label>
      <div class="row">
        <div style="flex:2"><input id="imgFile" type="file" accept="image/*"></div>
        <div style="flex:2"><input id="imgUrl" type="text" placeholder="…or paste an image URL"></div>
      </div>
      <img id="imgPreview" alt="" hidden style="max-height:120px;margin-top:8px;border-radius:8px">

      <div class="actions">
        <button class="go" id="send">Send announcement</button>
        <button class="ghost" id="clear">Clear / dismiss all</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="card" style="margin-top:16px">
      <label for="newProfile">Custom profiles</label>
      <div class="row">
        <div style="flex:2"><input id="newProfile" type="text" placeholder="e.g. Garage Gym" maxlength="40"></div>
        <div style="flex:0"><button class="ghost" id="addProfile" type="button">Add</button></div>
      </div>
      <div class="presets" id="profileList" style="margin-top:12px"></div>
      <div class="status" id="profStatus"></div>
    </div>

    <div class="hint">
      Each display shows messages targeted to <code>All</code> or to its own <b>Profile</b>
      (set per device in the clock's Settings → Profile). Banner auto-hides after the duration.
    </div>
  </div>

  <script>
    var BUILTINS = ['Theater Room','Study Room','Kitchen','Living Room','Bedroom','Office','Garage'];
    var customProfiles = [];
    var PRESETS = ['Dinner is ready! 🍽️','Movie starting in 5 min 🎬','Time to leave 🚗','Bedtime 😴','Package delivered 📦'];

    var $ = function(id){ return document.getElementById(id); };

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // (Re)build the target dropdown from All + builtins + customs, preserving selection.
    var sel = $('target');
    function rebuildTargets(){
      var prev = sel.value;
      var all = BUILTINS.concat(customProfiles);
      sel.innerHTML = '<option value="all">All displays</option>' +
        all.map(function(p){ return '<option value="'+esc(p)+'">'+esc(p)+'</option>'; }).join('');
      if (prev){ sel.value = prev; }
    }
    rebuildTargets();

    // quick presets
    $('presets').innerHTML = PRESETS.map(function(p){ return '<button class="chip" type="button">'+p+'</button>'; }).join('');
    $('presets').addEventListener('click', function(e){
      if (e.target.classList.contains('chip')){ $('msg').value = e.target.textContent; $('msg').focus(); }
    });

    function setStatus(msg, ok){ var s=$('status'); s.textContent=msg; s.className='status '+(ok===true?'ok':ok===false?'err':''); }

    $('imgFile').addEventListener('change', function(){
      var f = this.files && this.files[0];
      var p = $('imgPreview');
      if (f){ p.src = URL.createObjectURL(f); p.hidden = false; $('imgUrl').value = ''; }
      else { p.hidden = true; p.removeAttribute('src'); }
    });
    $('imgUrl').addEventListener('input', function(){
      var u = this.value.trim(), p = $('imgPreview');
      if (u && !($('imgFile').files && $('imgFile').files[0])){ p.src = u; p.hidden = false; }
    });

    // announce.json is a queue (array). Reads tolerate 404/legacy-object/corrupt.
    function getQueue(){
      return fetch('announce.json?ts=' + Date.now(), { cache:'no-store' })
        .then(function(r){ return r.ok ? r.json() : []; })
        .then(function(j){ return Array.isArray(j) ? j : (j && j.id && j.text ? [j] : []); })
        .catch(function(){ return []; });
    }
    // Drop expired entries, then cap to the last 20.
    function trimQueue(arr){
      var now = Date.now();
      var live = arr.filter(function(a){
        if (!a || !a.id) return false;
        var dur = Number(a.duration) > 0 ? Number(a.duration) : 20;
        return !a.ts || (now - Number(a.ts)) / 1000 < dur;
      });
      return live.slice(-20);
    }
    function putQueue(arr){
      return fetch('announce.json', {
        method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(arr)
      });
    }

    // Upload the chosen image (if any) and resolve to its path, else the URL, else ''.
    function resolveImage(){
      var f = $('imgFile').files && $('imgFile').files[0];
      if (f){
        if (f.size > 8 * 1024 * 1024) return Promise.reject(new Error('image too large (max 8 MB)'));
        var ext = (f.name.split('.').pop() || '').toLowerCase().replace(/[^a-z0-9]/g, '') || 'img';
        var name = String(Date.now()) + '-' + Math.floor(Math.random() * 100000) + '.' + ext;
        return fetch('uploads/' + name, {
          method: 'PUT', headers: { 'Content-Type': f.type || 'application/octet-stream' }, body: f
        }).then(function(r){
          if (!r.ok) throw new Error(r.status === 413 ? 'image too large (max 8 MB)' : 'upload HTTP ' + r.status);
          return '/uploads/' + name;
        });
      }
      return Promise.resolve($('imgUrl').value.trim());
    }

    $('send').addEventListener('click', function(){
      var text = $('msg').value.trim();
      if (!text){ setStatus('Enter a message first.', false); return; }
      var dur = Math.max(3, Math.min(600, parseInt($('dur').value,10) || 20));
      var obj = {
        id: String(Date.now()) + '-' + Math.floor(Math.random()*10000),
        text: text, icon: ($('icon').value||'📢'), ts: Date.now(),
        duration: dur, target: $('target').value || 'all'
      };
      setStatus('Sending…');
      resolveImage().then(function(image){
        if (image) obj.image = image;
        return getQueue();
      }).then(function(q){
        return putQueue(trimQueue(q.concat([obj])));
      }).then(function(r){
        if (r.ok){
          setStatus('Sent to ' + obj.target + ' — displays will show it within ~15s.', true);
          $('imgFile').value = ''; $('imgUrl').value = ''; $('imgPreview').hidden = true;
        } else {
          setStatus('Failed (HTTP ' + r.status + '). Is WebDAV PUT allowed?', false);
        }
      }).catch(function(e){ setStatus('Failed: ' + (e && e.message ? e.message : e), false); });
    });

    $('clear').addEventListener('click', function(){
      setStatus('Clearing…');
      putQueue([]).then(function(r){
        setStatus(r.ok ? 'Cleared.' : 'Failed (HTTP '+r.status+').', r.ok);
      }).catch(function(e){ setStatus('Failed: ' + e, false); });
    });

    function setProfStatus(msg, ok){ var s=$('profStatus'); s.textContent=msg; s.className='status '+(ok===true?'ok':ok===false?'err':''); }

    function putProfiles(){
      return fetch('profiles.json', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ profiles: customProfiles })
      });
    }

    function renderProfiles(){
      $('profileList').innerHTML = customProfiles.length
        ? customProfiles.map(function(p){
            return '<button class="chip" type="button" data-name="'+esc(p)+'">'+esc(p)+' ✕</button>';
          }).join('')
        : '<span class="hint" style="margin:0">No custom profiles yet. Built-in rooms are always available.</span>';
    }

    function loadProfiles(){
      fetch('profiles.json?ts=' + Date.now(), { cache:'no-store' }).then(function(r){
        return r.ok ? r.json() : { profiles: [] };
      }).then(function(j){
        customProfiles = (j && Array.isArray(j.profiles)) ? j.profiles.map(function(x){ return String(x).trim(); }).filter(Boolean) : [];
        renderProfiles(); rebuildTargets();
      }).catch(function(){ customProfiles = []; renderProfiles(); rebuildTargets(); });
    }

    function isDup(name){
      var k = name.toLowerCase();
      if (k === 'none' || k === 'all') return true;
      var all = BUILTINS.concat(customProfiles);
      return all.some(function(p){ return p.toLowerCase() === k; });
    }

    $('addProfile').addEventListener('click', function(){
      var name = $('newProfile').value.trim();
      if (!name){ setProfStatus('Enter a name first.', false); return; }
      if (isDup(name)){ setProfStatus('"'+name+'" already exists.', false); return; }
      customProfiles.push(name);
      renderProfiles(); rebuildTargets();
      setProfStatus('Saving…');
      putProfiles().then(function(r){
        if (r.ok){ $('newProfile').value=''; setProfStatus('Added "'+name+'".', true); }
        else { customProfiles.pop(); renderProfiles(); rebuildTargets(); setProfStatus('Failed (HTTP '+r.status+').', false); }
      }).catch(function(e){ customProfiles.pop(); renderProfiles(); rebuildTargets(); setProfStatus('Failed: '+e, false); });
    });

    $('newProfile').addEventListener('keydown', function(e){ if (e.key === 'Enter'){ e.preventDefault(); $('addProfile').click(); } });

    $('profileList').addEventListener('click', function(e){
      var btn = e.target.closest ? e.target.closest('.chip') : e.target;
      if (!btn || !btn.getAttribute('data-name')) return;
      var name = btn.getAttribute('data-name');
      var idx = customProfiles.indexOf(name);
      if (idx < 0) return;
      var removed = customProfiles.splice(idx, 1)[0];
      renderProfiles(); rebuildTargets();
      setProfStatus('Saving…');
      putProfiles().then(function(r){
        if (r.ok){ setProfStatus('Removed "'+removed+'".', true); }
        else { customProfiles.splice(idx, 0, removed); renderProfiles(); rebuildTargets(); setProfStatus('Failed (HTTP '+r.status+').', false); }
      }).catch(function(err){ customProfiles.splice(idx, 0, removed); renderProfiles(); rebuildTargets(); setProfStatus('Failed: '+err, false); });
    });

    loadProfiles();
  </script>
</body>
</html>
